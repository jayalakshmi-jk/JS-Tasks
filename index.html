    <button id="btn">Click</button>
    <div class="hidden">
        <p>Hi JAYA!!!!</p>
    </div>
    <script>
        let btn = document.getElementById("btn")
        let content = document.querySelector(".hidden")

        btn.addEventListener("click",()=>{
            content.classList.toggle ("hidden");

            btn.classList.toggle ("active");
        })
    </script>
